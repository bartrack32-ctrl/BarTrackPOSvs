<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional bar management system with sales tracking, inventory management, analytics, and real-time reporting">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BarTrack POS">
    <title>BarTrack POS - Professional Bar Management System</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center; color: white;">
            <div class="loading-spinner" style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="margin: 0; font-size: 24px; font-weight: 600;">BarTrack POS</h2>
            <p style="margin: 10px 0 0; opacity: 0.9;">Loading your bar management system...</p>
        </div>
    </div>
    
    <div id="app" role="main" aria-label="BarTrack POS Application"></div>
    
    <!-- PWA Install Prompt -->
    <div id="install-prompt" style="display: none; position: fixed; bottom: 20px; right: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 300px; z-index: 1000;">
        <h3 style="margin: 0 0 10px; font-size: 16px; font-weight: 600;">Install BarTrack POS</h3>
        <p style="margin: 0 0 15px; font-size: 14px; color: #666;">Add to your home screen for quick access and offline use.</p>
        <div style="display: flex; gap: 10px;">
            <button id="install-button" class="btn btn-primary" style="flex: 1;">Install</button>
            <button id="install-dismiss" class="btn btn-secondary" style="flex: 1;">Later</button>
        </div>
    </div>
    
    <!-- Offline Indicator -->
    <div id="offline-indicator" style="display: none; position: fixed; top: 0; left: 0; width: 100%; background: #f6ad55; color: #1a202c; padding: 10px; text-align: center; z-index: 9998; font-weight: 600;">
        ⚠️ You are offline. Changes will sync when connection is restored.
    </div>
    
    <script src="main.js"></script>
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
        
        // PWA install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });
        
        document.getElementById('install-button')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });
        
        document.getElementById('install-dismiss')?.addEventListener('click', () => {
            document.getElementById('install-prompt').style.display = 'none';
        });
        
        // Offline detection
        window.addEventListener('online', () => {
            document.getElementById('offline-indicator').style.display = 'none';
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-indicator').style.display = 'block';
        });
        
        // Hide loading screen after page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                document.getElementById('loading-screen').style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);
            }, 1000);
        });
    </script>
    
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
